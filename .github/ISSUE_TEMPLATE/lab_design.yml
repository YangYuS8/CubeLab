name: Lab design
description: Propose a lab or course design item.
title: "[Lab Design] "
labels:
  - lab-design
body:
  - type: textarea
    id: objective
    attributes:
      label: Teaching objective
      description: What should the learner be able to do?
    validations:
      required: true
  - type: textarea
    id: scenario
    attributes:
      label: Lab scenario
      description: Describe the environment and problem context.
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Validation and checks
      description: What should automated checks verify?
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Resource and safety constraints
      description: Note expected limits, network policy, or safety boundaries.
    validations:
      required: true
